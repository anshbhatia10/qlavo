  <style>
    /* ===== BASE ===== */
    body {
      background-color: #09090b;
      color: #f4f4f5;
      font-family: 'Inter', sans-serif;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #09090b; }
    ::-webkit-scrollbar-thumb { background: #1a1a1e; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #27272a; }
    
    ::selection { background: #10b981; color: #09090b; }

    /* ===== GLASSMORPHISM ===== */
    .glass-panel {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    
    .glass-panel-hover {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-panel-hover:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(16, 185, 129, 0.3);
      transform: translateY(-2px);
    }

    /* ===== GRADIENT TEXT ===== */
    .text-gradient-emerald {
      background: linear-gradient(to right, #10b981, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .text-gradient-white {
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== BACKGROUND EFFECTS ===== */
    .bg-grid {
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .bg-glow-emerald {
      background: radial-gradient(ellipse at center, rgba(16,185,129,0.08) 0%, transparent 60%);
    }
    
    .bg-glow-top {
      background: radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.06) 0%, transparent 60%);
    }

    /* ===== CARD DESIGNS ===== */
    .bento-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bento-card:hover {
      border-color: rgba(16, 185, 129, 0.25);
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(16, 185, 129, 0.06);
    }
    
    .bento-card-lg {
      grid-column: span 2;
    }

    /* ===== INPUT ===== */
    .audit-input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px 24px;
      color: white;
      font-size: 16px;
      width: 100%;
      outline: none;
      transition: all 0.3s ease;
    }
    .audit-input:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }
    .audit-input::placeholder {
      color: #52525b;
    }

    /* ===== BUTTONS ===== */
    .btn-primary {
      background: #10b981;
      color: #09090b;
      font-weight: 600;
      border-radius: 100px;
      padding: 16px 32px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover {
      background: #34d399;
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
    }
    
    .btn-secondary {
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      font-weight: 500;
      border-radius: 100px;
      padding: 16px 32px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* ===== SCROLL REVEAL ===== */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== NUMBER STATS ===== */
    .stat-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3.75rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      background: linear-gradient(to bottom, #fff 40%, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .stat-number { font-size: 2.5rem; }
    }
  </style>
